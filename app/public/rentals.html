<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rentals - e-Hotels</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 30px;
      background: #f7f7f7;
    }
    h1, h2 {
      margin-bottom: 15px;
    }
    form, .panel {
      background: white;
      padding: 20px;
      border-radius: 10px;
      max-width: 1000px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 25px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 15px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      margin-top: 15px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      background: #efefef;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
    }
    .message {
      margin: 15px 0;
      font-weight: bold;
    }
    .action-btn {
      width: auto;
      padding: 8px 12px;
      margin-top: 0;
    }
    .status-select {
      width: 100%;
      min-width: 120px;
    }
  </style>
</head>
<body>
  <a class="back-link" href="/">← Back to Home</a>
  <h1>Rentals</h1>

  <div class="panel">
    <h2>Create Direct Rental</h2>
    <form id="directRentalForm">
      <div class="grid">
        <div>
          <label for="directClientId">Client</label>
          <select id="directClientId" required>
            <option value="">Select a client</option>
          </select>
        </div>

        <div>
          <label for="directHotelId">Hotel</label>
          <select id="directHotelId" required>
            <option value="">Select a hotel</option>
          </select>
        </div>

        <div>
          <label for="directRoomNumber">Room Number</label>
          <select id="directRoomNumber" required>
            <option value="">Select a room</option>
          </select>
        </div>

        <div>
          <label for="directEmployeeId">Processed By Employee</label>
          <select id="directEmployeeId" required>
            <option value="">Select an employee</option>
          </select>
        </div>

        <div>
          <label for="directStatus">Status</label>
          <select id="directStatus" required>
            <option value="active">active</option>
            <option value="completed">completed</option>
            <option value="cancelled">cancelled</option>
          </select>
        </div>

        <div>
          <label for="directStartDate">Start Date</label>
          <input type="date" id="directStartDate" required />
        </div>

        <div>
          <label for="directEndDate">End Date</label>
          <input type="date" id="directEndDate" required />
        </div>
      </div>

      <button type="submit">Create Direct Rental</button>
    </form>
    <div id="directRentalMessage" class="message"></div>
  </div>

  <div class="panel">
    <h2>Convert Reservation to Rental</h2>
    <form id="convertForm">
      <div class="grid">
        <div>
          <label for="reservationId">Reservation</label>
          <select id="reservationId" required>
            <option value="">Select a reservation</option>
          </select>
        </div>

        <div>
          <label for="convertEmployeeId">Processed By Employee</label>
          <select id="convertEmployeeId" required>
            <option value="">Select an employee</option>
          </select>
        </div>

        <div>
          <label for="convertStatus">Rental Status</label>
          <select id="convertStatus" required>
            <option value="active">active</option>
            <option value="completed">completed</option>
            <option value="cancelled">cancelled</option>
          </select>
        </div>
      </div>

      <button type="submit">Convert Reservation</button>
    </form>
    <div id="convertMessage" class="message"></div>
  </div>

  <h2>Existing Rentals</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Client</th>
        <th>Hotel</th>
        <th>Room</th>
        <th>Start</th>
        <th>End</th>
        <th>Status</th>
        <th>Processed By</th>
        <th>Reservation ID</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="rentalTableBody"></tbody>
  </table>

  <script>
    async function loadClients() {
      const res = await fetch('/api/clients');
      const clients = await res.json();

      const selects = [document.getElementById('directClientId')];
      selects.forEach(select => {
        select.innerHTML = '<option value="">Select a client</option>';
        clients.forEach(client => {
          const option = document.createElement('option');
          option.value = client.client_id;
          option.textContent = `${client.client_id} - ${client.first_name} ${client.last_name}`;
          select.appendChild(option);
        });
      });
    }

    async function loadHotels() {
      const res = await fetch('/api/hotels');
      const hotels = await res.json();

      const hotelSelect = document.getElementById('directHotelId');
      hotelSelect.innerHTML = '<option value="">Select a hotel</option>';

      hotels.forEach(hotel => {
        const option = document.createElement('option');
        option.value = hotel.hotel_id;
        option.textContent = `${hotel.hotel_name} (${hotel.area})`;
        hotelSelect.appendChild(option);
      });
    }

    async function loadRoomsForHotel(hotelId) {
      const roomSelect = document.getElementById('directRoomNumber');
      roomSelect.innerHTML = '<option value="">Select a room</option>';

      if (!hotelId) return;

      const res = await fetch(`/api/rooms-by-hotel/${hotelId}`);
      const rooms = await res.json();

      rooms.forEach(room => {
        const option = document.createElement('option');
        option.value = room.room_number;
        option.textContent = `${room.room_number} - Capacity ${room.capacity} - $${room.price}`;
        roomSelect.appendChild(option);
      });
    }

    async function loadEmployees() {
      const res = await fetch('/api/employees');
      const employees = await res.json();

      const selects = [
        document.getElementById('directEmployeeId'),
        document.getElementById('convertEmployeeId')
      ];

      selects.forEach(select => {
        select.innerHTML = '<option value="">Select an employee</option>';
        employees.forEach(emp => {
          const option = document.createElement('option');
          option.value = emp.employee_id;
          option.textContent = `${emp.employee_id} - ${emp.first_name} ${emp.last_name} (${emp.hotel_name})`;
          select.appendChild(option);
        });
      });
    }

    async function loadConvertibleReservations() {
      const res = await fetch('/api/convertible-reservations');
      const reservations = await res.json();

      const select = document.getElementById('reservationId');
      select.innerHTML = '<option value="">Select a reservation</option>';

      reservations.forEach(r => {
        const option = document.createElement('option');
        option.value = r.reservation_id;
        option.textContent = `#${r.reservation_id} - ${r.client_name} - ${r.hotel_name} Room ${r.room_number}`;
        select.appendChild(option);
      });
    }

    async function loadRentals() {
      const res = await fetch('/api/rentals');
      const rentals = await res.json();
      const tbody = document.getElementById('rentalTableBody');
      tbody.innerHTML = '';

      rentals.forEach(r => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${r.rental_id}</td>
          <td>${r.client_name}</td>
          <td>${r.hotel_name}</td>
          <td>${r.room_number}</td>
          <td>${r.rental_start_date}</td>
          <td>${r.rental_end_date}</td>
          <td>
            <select class="status-select" onchange="updateRentalStatus(${r.rental_id}, this.value)">
              <option value="active" ${r.status === 'active' ? 'selected' : ''}>active</option>
              <option value="completed" ${r.status === 'completed' ? 'selected' : ''}>completed</option>
              <option value="cancelled" ${r.status === 'cancelled' ? 'selected' : ''}>cancelled</option>
            </select>
          </td>
          <td>${r.processed_by || ''}</td>
          <td>${r.reservation_id || ''}</td>
          <td>
            <button class="action-btn" onclick="deleteRental(${r.rental_id})">Delete</button>
          </td>
        `;
        tbody.appendChild(row);
      });
    }

    async function updateRentalStatus(rentalId, status) {
      try {
        const res = await fetch(`/api/rentals/${rentalId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to update rental.');

        document.getElementById('directRentalMessage').textContent = `Rental ${rentalId} updated successfully.`;
        await loadRentals();
      } catch (error) {
        document.getElementById('directRentalMessage').textContent = error.message;
      }
    }

    async function deleteRental(rentalId) {
      if (!confirm(`Delete rental ${rentalId}?`)) return;

      try {
        const res = await fetch(`/api/rentals/${rentalId}`, {
          method: 'DELETE'
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to delete rental.');

        document.getElementById('directRentalMessage').textContent = `Rental ${rentalId} deleted successfully.`;
        await loadRentals();
        await loadConvertibleReservations();
      } catch (error) {
        document.getElementById('directRentalMessage').textContent = error.message;
      }
    }

    document.getElementById('directHotelId').addEventListener('change', async (e) => {
      await loadRoomsForHotel(e.target.value);
    });

    document.getElementById('directRentalForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const messageDiv = document.getElementById('directRentalMessage');

      const payload = {
        clientId: document.getElementById('directClientId').value,
        hotelId: document.getElementById('directHotelId').value,
        roomNumber: document.getElementById('directRoomNumber').value,
        employeeId: document.getElementById('directEmployeeId').value,
        startDate: document.getElementById('directStartDate').value,
        endDate: document.getElementById('directEndDate').value,
        status: document.getElementById('directStatus').value
      };

      try {
        const res = await fetch('/api/rentals/direct', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to create rental.');

        messageDiv.textContent = `Direct rental ${data.rental_id} created successfully.`;
        document.getElementById('directRentalForm').reset();
        document.getElementById('directRoomNumber').innerHTML = '<option value="">Select a room</option>';
        await loadRentals();
        await loadConvertibleReservations();
      } catch (error) {
        messageDiv.textContent = error.message;
      }
    });

    document.getElementById('convertForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const messageDiv = document.getElementById('convertMessage');

      const payload = {
        reservationId: document.getElementById('reservationId').value,
        employeeId: document.getElementById('convertEmployeeId').value,
        status: document.getElementById('convertStatus').value
      };

      try {
        const res = await fetch('/api/rentals/convert', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to convert reservation.');

        messageDiv.textContent = `Reservation ${payload.reservationId} converted to rental ${data.rental_id}.`;
        document.getElementById('convertForm').reset();
        await loadRentals();
        await loadConvertibleReservations();
      } catch (error) {
        messageDiv.textContent = error.message;
      }
    });

    async function initPage() {
      await loadClients();
      await loadHotels();
      await loadEmployees();
      await loadConvertibleReservations();
      await loadRentals();
    }

    initPage();
  </script>
</body>
</html>
